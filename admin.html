<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Seating — Admin</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="header">
    <div class="header-left">
      <h1>Edit Seating</h1>
    </div>
    <div class="header-right">
      <a href="index.html" class="btn-admin">View Chart</a>
    </div>
  </div>

  <div class="admin-layout">

    <div class="admin-sidebar">
      <div class="admin-sidebar-header">Employees</div>
      <div class="admin-search">
        <input type="text" id="employee-search" placeholder="Search name…" autocomplete="off" />
      </div>
      <div class="employee-list" id="employee-list"></div>
      <div class="admin-actions">
        <div class="status-msg" id="status-msg"></div>
        <button class="btn-save" id="btn-save">Save Changes</button>
      </div>
    </div>

    <div class="admin-map">
      <div id="svg-wrapper"></div>
    </div>

  </div>

  <!-- Trash zone — appears during drag -->
  <div class="trash-zone" id="trash-zone">
    <span class="trash-icon">&#128465;</span>
    <span>Drop to unassign</span>
  </div>

  <!-- Employee edit popup -->
  <div class="emp-modal-overlay" id="emp-modal-overlay">
    <div class="emp-modal">
      <div class="emp-modal-header">
        <span class="emp-modal-title" id="emp-modal-name"></span>
        <button class="emp-modal-close" id="emp-modal-close">&times;</button>
      </div>
      <div class="emp-modal-body">
        <label class="emp-modal-label">Title</label>
        <input type="text" class="emp-modal-input" id="emp-modal-title-input" />
        <label class="emp-modal-label">Email</label>
        <input type="text" class="emp-modal-input" id="emp-modal-email-input" />
        <label class="emp-modal-label">Profile URL</label>
        <input type="text" class="emp-modal-input" id="emp-modal-url-input" placeholder="Paste Synthesis profile URL…" />
      </div>
      <div class="emp-modal-footer">
        <button class="btn-save" id="emp-modal-save">Save</button>
      </div>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
