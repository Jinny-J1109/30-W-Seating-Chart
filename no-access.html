<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>No Access</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f5f5f0;
      color: #2c3e50;
    }
    .container {
      text-align: center;
      padding: 40px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      max-width: 440px;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 12px;
      color: #1a2a3a;
    }
    p {
      font-size: 15px;
      color: #666;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    a {
      display: inline-block;
      padding: 10px 24px;
      background: #1a2a3a;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-size: 14px;
    }
    a:hover { background: #2c3e50; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Access Restricted</h1>
    <p>You don't have permission to edit the seating chart. Please contact the administrator if you need access.</p>
    <a href="/">Back to Seating Chart</a>
  </div>
</body>
</html>
